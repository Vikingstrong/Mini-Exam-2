<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam 2</title>
    <link rel="stylesheet" href="src/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header class="max-w-300 m-auto flex p-6.25 justify-between items-center">
        <img src="src/img/header/logo.png" alt="">
        <i class="fa-solid fa-bars text-[26px] lg:hidden!" style="color: #685ed6;"></i>
        <div class="hidden lg:flex items-center gap-3">
            <button class="bg-[#F1E4FF] text-[#685ED6] py-2 px-5 rounded-[5px] font-bold">Вход</button>
            <button class="bg-[#685ED6] text-white py-2 px-5 rounded-[5px] font-bold">Регистрация</button>
        </div>
    </header>
    <section class="max-w-300 m-auto flex flex-col p-6.25 gap-10 lg:flex-row lg:justify-between lg:py-25">
        <aside class="flex flex-col gap-5 items-start">
            <h2 class="font-bold text-[34px] lg:text-[50px]"><span class="text-[#685ed6]">Telegram чат</span> <br> на вашем сайте</h2>
            <p class="text-[18px]">Общение с клиентами станет простым и удобным, а подключение займёт 5 минут. <br> Первый месяц — <span class="font-bold text-[#685ED6]">бесплатно!</span></p>
            <button class="text-[white] bg-[#685ED6] px-5 py-2 rounded-[5px]">Подключить</button>
        </aside>
        <img src="src/img/section1/img.png" alt="">
    </section>
</body>
</html>
